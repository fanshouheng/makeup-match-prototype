name: Bug 报告
description: 报告可以稳定复现的软件问题
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿上传真人照片、面部特征、邮箱、授权证明、密钥或生产数据。

  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已移除真人照片、联系方式、面部数据、密钥和其他敏感信息。
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 实际发生了什么？
      placeholder: 请描述清楚、可观察的错误行为。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开...
        2. 选择...
        3. 看到...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 使用环境
      description: 操作系统、浏览器及版本、设备类型。
      placeholder: Windows 11 / Chrome 版本号 / 桌面端
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可以提供已去标识化的控制台错误或使用合成数据制作的截图。
